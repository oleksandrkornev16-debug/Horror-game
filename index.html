<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Last Shell - Mobile Lite</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; }
        canvas { display: block; image-rendering: pixelated; } /* Додає чіткості на низькій роздільній здатності */
        
        #menu { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; color: #f00; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 100;
        }
        
        .btn { 
            background: #400; border: 2px solid #f00; color: #fff; padding: 20px 50px; 
            font-size: 24px; border-radius: 10px; cursor: pointer;
        }

        /* Елементи керування */
        #joy-zone { position: absolute; bottom: 30px; left: 30px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; display: none; }
        #joy-stick { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; background: #f00; border-radius: 50%; transform: translate(-50%, -50%); opacity: 0.5; }
        #fire-btn { position: absolute; bottom: 30px; right: 30px; width: 100px; height: 100px; background: rgba(255,0,0,0.3); border: 3px solid #f00; border-radius: 50%; display: none; color: #fff; display: none; align-items: center; justify-content: center; font-weight: bold; }
        
        #ui { position: absolute; top: 10px; left: 10px; color: #0f0; font-family: monospace; font-size: 12px; pointer-events: none; display: none; }
    </style>
</head>
<body>

<div id="menu">
    <h1>THE LAST SHELL</h1>
    <p>ОПТИМІЗОВАНО ДЛЯ СЛАБКИХ ТЕЛЕФОНІВ</p>
    <button class="btn" onclick="startGame()">START</button>
</div>

<div id="ui">FPS: <span id="fps">0</span> | POS: <span id="pos">0,0</span></div>
<div id="joy-zone"><div id="joy-stick"></div></div>
<div id="fire-btn">FIRE</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    let scene, camera, renderer, monster, gun, walls = [];
    let isStarted = false, hasGun = false;
    let joyId = null, lookId = null;
    let joyStart = {x:0, y:0}, moveVec = {x:0, y:0}, lastLook = {x:0, y:0};

    window.startGame = async () => {
        document.getElementById('menu').style.display = 'none';
        document.getElementById('ui').style.display = 'block';
        document.getElementById('joy-zone').style.display = 'block';
        
        // Повний екран та поворот
        const de = document.documentElement;
        if(de.requestFullscreen) de.requestFullscreen();
        if(screen.orientation && screen.orientation.lock) screen.orientation.lock('landscape').catch(()=>{});

        init();
    };

    function init() {
        scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x000000, 1, 15); // Короткий туман для швидкості

        camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.rotation.order = 'YXZ';
        camera.position.set(0, 1.2, 0);

        renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
        renderer.setPixelRatio(0.7); // Рендеримо в 70% якості для швидкості
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Спрощене світло (тільки ліхтарик)
        const light = new THREE.PointLight(0xffffff, 10, 15);
        camera.add(light);
        scene.add(camera);

        // Підлога
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshBasicMaterial({color: 0x050505}));
        floor.rotation.x = -Math.PI/2;
        scene.add(floor);

        // Стіни (спрощені)
        const wallGeo = new THREE.BoxGeometry(4, 8, 4);
        const wallMat = new THREE.MeshBasicMaterial({color: 0x111111});
        for(let i=0; i<40; i++) {
            const w = new THREE.Mesh(wallGeo, wallMat);
            w.position.set(Math.random()*80-40, 4, Math.random()*80-40);
            if(w.position.length() > 8) {
                scene.add(w);
                walls.push(new THREE.Box3().setFromObject(w));
            }
        }

        // Монстр (червоний куб для швидкості)
        monster = new THREE.Mesh(new THREE.BoxGeometry(1.2, 2, 1.2), new THREE.MeshBasicMaterial({color: 0xff0000}));
        monster.position.set(20, 1, 20);
        scene.add(monster);

        setupControls();
        animate();
    }

    function setupControls() {
        window.addEventListener('touchstart', e => {
            for(let t of e.changedTouches) {
                if(t.clientX < window.innerWidth/2 && joyId === null) {
                    joyId = t.identifier; joyStart = {x: t.clientX, y: t.clientY};
                } else if(lookId === null) {
                    lookId = t.identifier; lastLook = {x: t.clientX, y: t.clientY};
                }
            }
        });

        window.addEventListener('touchmove', e => {
            for(let t of e.touches) {
                if(t.identifier === joyId) {
                    let dx = t.clientX - joyStart.x;
                    let dy = t.clientY - joyStart.y;
                    let dist = Math.min(Math.sqrt(dx*dx+dy*dy), 40);
                    let ang = Math.atan2(dy, dx);
                    moveVec = {x: Math.cos(ang)*(dist/40), y: Math.sin(ang)*(dist/40)};
                    document.getElementById('joy-stick').style.transform = `translate(calc(-50% + ${Math.cos(ang)*dist}px), calc(-50% + ${Math.sin(ang)*dist}px))`;
                }
                if(t.identifier === lookId) {
                    camera.rotation.y -= (t.clientX - lastLook.x) * 0.005;
                    camera.rotation.x -= (t.clientY - lastLook.y) * 0.005;
                    camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x));
                    lastLook = {x: t.clientX, y: t.clientY};
                }
            }
        });

        window.addEventListener('touchend', e => {
            for(let t of e.changedTouches) {
                if(t.identifier === joyId) { joyId = null; moveVec = {x:0, y:0}; }
                if(t.identifier === lookId) lookId = null;
            }
        });
    }

    let lastTime = 0;
    function animate(time) {
        requestAnimationFrame(animate);
        
        // FPS Meter
        const dt = time - lastTime;
        lastTime = time;
        document.getElementById('fps').innerText = Math.round(1000/dt);

        // Рух
        const speed = 0.15;
        const forward = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
        forward.y = 0; forward.normalize();
        const right = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);
        right.y = 0; right.normalize();

        const oldPos = camera.position.clone();
        camera.position.addScaledVector(forward, -moveVec.y * speed);
        camera.position.addScaledVector(right, moveVec.x * speed);

        // Спрощена колізія
        const pBox = new THREE.Box3().setFromCenterAndSize(camera.position, new THREE.Vector3(0.6, 1, 0.6));
        for(let w of walls) { if(pBox.intersectsBox(w)) camera.position.copy(oldPos); }

        // Логіка монстра
        monster.position.lerp(camera.position, 0.015);
        if(camera.position.distanceTo(monster.position) < 1.5) {
             alert("ПЕРДЬОЖ! СКЕЛЕТ!"); // Спрощений скример для швидкості
             location.reload();
        }

        document.getElementById('pos').innerText = `${Math.round(camera.position.x)}, ${Math.round(camera.position.z)}`;
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
